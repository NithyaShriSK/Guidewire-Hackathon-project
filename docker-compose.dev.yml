version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: gigshield-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: gigshield
    ports:
      - "27018:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - gigshield-dev-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: gigshield-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - gigshield-dev-network

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gigshield-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/gigshield?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-key
      JWT_EXPIRE: 7d
      # Development API Keys (replace with actual keys for production)
      WEATHER_API_KEY: ${WEATHER_API_KEY:-dev-weather-key}
      POLLUTION_API_KEY: ${POLLUTION_API_KEY:-dev-pollution-key}
      TRAFFIC_API_KEY: ${TRAFFIC_API_KEY:-dev-traffic-key}
      UPI_MERCHANT_ID: ${UPI_MERCHANT_ID:-dev-merchant-id}
      UPI_API_KEY: ${UPI_API_KEY:-dev-upi-key}
    ports:
      - "5002:5000"
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    networks:
      - gigshield-dev-network
    command: npm run dev

  # Frontend Development Server
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: gigshield-frontend-dev
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5002/api
      REACT_APP_ENV: development
    ports:
      - "3001:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - gigshield-dev-network
    command: npm start

volumes:
  mongodb_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  gigshield-dev-network:
    driver: bridge
